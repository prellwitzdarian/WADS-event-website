<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="contactpage.css" />
    <script
      src="https://kit.fontawesome.com/891b494f17.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <a href="homepage.html" class="logo"
        ><img
          src="https://scontent-sea5-1.xx.fbcdn.net/v/t1.15752-9/650725756_1321744213095454_8422535321509222631_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=fc17b8&efg=eyJxZV9ncm91cHMiOlsiaWdkX2Jlc3RfZWZmb3J0X2ltYWdlOmNvbnRyb2wiXX0%3D&_nc_ohc=YHq3yqbRc1MQ7kNvwGzgP7-&_nc_oc=Adk1o5fhj7gOxvEhJ173w9d68ItHR9v6qB5JZqZ1Ngdn4d1gQ2SY7lcmwZZw0PCKQLZr8E8YRttBrg41eJpuE738&_nc_zt=23&_nc_ht=scontent-sea5-1.xx&_nc_ss=8&oh=03_Q7cD4wE07axsppsJTM2Om5c_MRYfaaEA6kYofwA3e5swtQvkdg&oe=69DA99B5"
          alt="Seattle LADS"
      /></a>
      <nav>
        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
        <ul class="navigation">
          <li><a href="homepage.html">Home</a></li>
          <li><a href="aboutpage.html">About</a></li>
          <li><a href="eventpage.html">Events</a></li>
          <li><a href="contactpage.html">Contact Us</a></li>
        </ul>
      </nav>
    </header>

    <section class="contactus">
      <div class="title">
        <h2 class="titleText"><span>C</span>ontact Us</h2>
        <p>Have any questions? Got some feedback? Let us know!</p>
      </div>
      <form action="#" method="POST">
        <div class="contactform">
          <h3>Send Message</h3>
          <div class="inputbox">
            <input type="text" placeholder="Name" required />
          </div>

          <div class="inputbox">
            <input type="email" placeholder="Email" required />
          </div>

          <div class="inputbox">
            <textarea placeholder="Message" required></textarea>
          </div>

          <div class="inputbox">
            <input type="submit" value="Send" />
          </div>
        </div>
      </form>
    </section>

    <div class="footer">
      <p>
        &copy; 2026 Seattle LADS. All rights reserved. Code and web design by
        Darian.
      </p>
      <div class="icons">
        <a href="https://www.instagram.com/seattlelads/"
          ><i class="fa-brands fa-instagram"></i
        ></a>
        <a href="https://www.tiktok.com/@seattle_lads"
          ><i class="fa-brands fa-tiktok"></i
        ></a>
      </div>
    </div>
    <script>
      function toggleMenu() {
        const menu = document.querySelector(".navigation");
        menu.classList.toggle("active");
      }
    </script>
  </body>
</html>
